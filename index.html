<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced To-Do App</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
    }

    .input-group {
      display: flex;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      padding: 10px;
      margin-top: 8px;
      background: #f1f1f1;
      display: flex;
      justify-content: space-between;
      border-radius: 6px;
      align-items: center;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      color: red;
      cursor: pointer;
      margin-left: 10px;
    }

    small {
      display: block;
      font-size: 10px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>To-Do App</h2>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      let li = document.createElement("li");

      li.innerHTML = `
        <div onclick="toggleComplete(${index})">
          <span class="${task.completed ? 'completed' : ''}">
            ${task.text}
          </span>
          <small>${task.time}</small>
        </div>
        <span class="delete" onclick="deleteTask(${index})">X</span>
      `;

      list.appendChild(li);
    });
  }

  function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if (text === "") {
      alert("Enter a task!");
      return;
    }

    let newTask = {
      text: text,
      completed: false,
      time: new Date().toLocaleString()
    };

    tasks.push(newTask);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    input.value = "";
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    renderTasks();
  }

  function toggleComplete(index) {
    tasks[index].completed = !tasks[index].completed;
    localStorage.setItem("tasks", JSON.stringify(tasks));
    renderTasks();
  }

  // Enter key support
  document.getElementById("taskInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      addTask();
    }
  });

  renderTasks();
</script>

</body>
</html>
